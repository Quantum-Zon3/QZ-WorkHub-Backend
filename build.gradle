plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.5'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'jacoco'
	id 'io.qameta.allure' version '2.11.2'
	id 'org.sonarqube' version '4.4.1.3373'
}

group = 'com.quantumzone'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-validation'

	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.2.0'
	implementation 'org.hibernate.validator:hibernate-validator:8.0.1.Final'

	runtimeOnly 'com.mysql:mysql-connector-j'

	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'

	implementation 'org.mapstruct:mapstruct:1.6.3'
	annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
	annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.mockito:mockito-inline:5.2.0'
	testImplementation 'com.h2database:h2:2.2.224'
	testImplementation 'org.mockito:mockito-junit-jupiter:5.2.0'
	testImplementation 'io.qameta.allure:allure-junit5:2.24.0'
	testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
}

test {
	useJUnitPlatform()
	jvmArgs '-XX:+EnableDynamicAgentLoading'
	systemProperty "spring.profiles.active", "test"
	finalizedBy jacocoTestReport
}

jacoco {
	toolVersion = "0.8.12"
}

jacocoTestReport {
	dependsOn test
	reports {
		xml.required = true
		html.required = true
	}

	afterEvaluate {
		classDirectories.setFrom(files(classDirectories.files.collect {
			fileTree(dir: it, exclude: [
					'org/springframework/**',
					'oracle/**',
					'**/config/**',
					'**/dto/**',
					'**/entity/**'
			])
		}))
	}
}

jacocoTestCoverageVerification {
	dependsOn jacocoTestReport

	violationRules {
		rule {
			limit {
				minimum = 0.0
			}
		}
	}

	afterEvaluate {
		classDirectories.setFrom(files(classDirectories.files.collect {
			fileTree(dir: it, exclude: [
					'org/springframework/**',
					'oracle/**',
					'**/config/**',
					'**/dto/**',
					'**/entity/**'
			])
		}))
	}
}

allure {
	version = "2.24.0"
	autoconfigure = true
	aspectjweaver = true
}

sonarqube {
	properties {
		property "sonar.projectKey", "ExpooCode-Project"
		property "sonar.projectName", "ExpooCode"
		property "sonar.host.url", "http://localhost:9000/"
		property "sonar.token", "sqp_c6a080fb6621552815142142a8088e46050ef5c7"
		property "sonar.sources", "src/main/java"
		property "sonar.tests", "src/test/java"
		property "sonar.java.binaries", "build/classes/java/main"
		property "sonar.coverage.jacoco.xmlReportPaths", "build/reports/jacoco/test/jacocoTestReport.xml"
		property "sonar.gradle.skipCompile", "true"
	}
}

// Tarea personalizada para verificar y generar reporte de Allure de forma segura
tasks.register('safeAllureReport') {
	group = 'verification'
	description = 'Genera reporte de Allure solo si existen resultados'

	// Asegurarse de que Allure esté descargado antes de ejecutar
	dependsOn 'downloadAllure'

	doLast {
		def resultsDir = file("${project.layout.buildDirectory.get()}/allure-results")
		if (resultsDir.exists() && resultsDir.listFiles()?.length > 0) {
			println "✅ Se encontraron ${resultsDir.listFiles().length} archivo(s) de resultados de Allure"
			println "📊 Generando reporte de Allure..."
			try {
				tasks.allureReport.actions.each { it.execute(tasks.allureReport) }
				println "✅ Reporte de Allure generado exitosamente en: ${project.layout.buildDirectory.get()}/reports/allure-report/allureReport/index.html"
			} catch (Exception e) {
				println "⚠️ Error al generar reporte de Allure: ${e.message}"
				println "💡 Intenta ejecutar: ./gradlew allureReport manualmente"
			}
		} else {
			println "⚠️ No se encontraron resultados de Allure en: ${resultsDir.absolutePath}"
			println "💡 Asegúrate de que tus tests estén anotados con @Epic, @Feature, @Story, etc."
		}
	}
}

// Configuración para ejecutar Allure después de los tests
tasks.named('test') {
	finalizedBy 'safeAllureReport'
}