# ? Swagger deshabilitado para pruebas
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ? Base de datos H2 en memoria para los tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ? Dialecto de Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ? Crear y eliminar tablas solo durante las pruebas
spring.jpa.hibernate.ddl-auto=create-drop

# ? Logs SQL desactivados para no ensuciar la consola
spring.jpa.show-sql=false

# ? Desactivar migraciones si usas Flyway/Liquibase
spring.flyway.enabled=false
spring.liquibase.enabled=false
